name: Deploy

# Deploy manual até os secrets (RAILWAY_TOKEN, VERCEL_TOKEN, VERCEL_ORG_ID,
# VERCEL_PROJECT_ID) estarem configurados em Settings → Secrets and variables.
# Para reativar o deploy automático, substitua "workflow_dispatch:" abaixo por:
#   push:
#     branches: [main]
on:
  workflow_dispatch:

jobs:
  # ── CI must pass before deploy ────────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci.yml

  # ── Deploy backend to Railway ─────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    needs: ci
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service fitcoach-backend --detach
        working-directory: backend

  # ── Deploy frontend to Vercel ─────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: ci
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel --prod --token $VERCEL_TOKEN --yes
        working-directory: frontend
